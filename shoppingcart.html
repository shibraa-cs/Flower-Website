<!DOCTYPE html>
<html>
<head>
    <title>Your Cart - Eternal Flowers</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css" href="designhomepage.css">
    <link rel="icon" type="image/x-icon" href="webimages/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;500&display=swap" rel="stylesheet">
    
    <style>
        .cart-container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .cart-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            border-radius: 10px;
            overflow: hidden;
        }
        .cart-table th {
            background: #9a238e;
            color: white;
            padding: 15px;
            text-align: left;
        }
        .cart-table td {
            padding: 15px;
            border-bottom: 1px solid #eee;
            vertical-align: middle;
        }
        .cart-table tr:hover {
            background: #f9f9f9;
        }
        .cart-product-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid #f0f0f0;
        }
        .cart-product-name {
            font-weight: 500;
            color: #333;
            margin-left: 10px;
        }
        .cart-total {
            text-align: right;
            font-size: 22px;
            padding: 20px 0;
            font-weight: bold;
            color: #9a238e;
        }
        .checkout-btn {
            background: #9a238e;
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 30px;
            font-size: 18px;
            cursor: pointer;
            margin: 10px 0 50px auto;
            display: block;
        }
        .checkout-btn:hover {
            background: #7a1a6e;
        }
        .empty-cart {
            text-align: center;
            padding: 60px 20px;
            background: #ffffff;
            border-radius: 10px;
            max-width: 600px;
            margin: 40px auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }
        .empty-cart h2 {
            color: #9a238e !important;
            font-size: 28px;
        }
        .empty-cart p {
            color: #333333 !important;
            font-size: 18px;
        }
        .empty-cart a {
            color: #9a238e !important;
            text-decoration: none;
            font-weight: bold;
        }
        .empty-cart a:hover {
            text-decoration: underline;
        }
        .quantity-btn {
            background: #9a238e;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 5px 12px;
            cursor: pointer;
            font-size: 14px;
        }
        .quantity-btn:hover {
            background: #7a1a6e;
        }
        .remove-btn {
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 5px 12px;
            cursor: pointer;
        }
        .remove-btn:hover {
            background: #c0392b;
        }
        .cart-item-total {
            font-weight: 500;
            color: #9a238e;
        }
        .product-cell {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        @media (max-width: 768px) {
            .cart-table {
                font-size: 14px;
            }
            .cart-product-img {
                width: 50px;
                height: 50px;
            }
            .cart-table td {
                padding: 10px;
            }
        }
    </style>
</head>
<body>

<!-- ===== NAVBAR ===== -->
<div class="navbar">
    <div class="logo">
        <a href="homepage.html"> <img id="logo" src="webimages/logo.png" width="125px"> </a>
    </div>
    <nav>
        <ul>
            <li><a href="homepage.html">Home</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="contactus.html">Contact Us</a></li>
        </ul>
        <a href="shoppingcart.html">🛒 Cart</a>      
    </nav>
</div>

<!-- ===== HERO SECTION ===== -->
<div class="hero-image">
    <div class="hero-text">
        <h1 style="font-size:50px">Your Shopping Cart</h1>
        <p style="padding:15px">Review your beautiful flowers before checkout.</p>
    </div>
</div>

<!-- ===== CART CONTENT ===== -->
<div class="cart-container">
    <div id="cart-container-inner">
        <!-- Cart items will be injected here -->
    </div>
</div>

<!-- ===== FOOTER ===== -->
<footer>
    <div class="container">
        <div class="footer-content">
            <div class="footer-info">
                <h3>Contact Information</h3>
                <p>123 Flower Street, City</p>
                <p>Phone: (123) 456-7890</p>
                <p>Email: info@eternalflowers.com</p>
            </div>
            <div class="footer-social">
                <h3>Follow Us</h3>
                <ul>
                    <li><a href="#"><img src="webimages/facebook.png" alt="Facebook"></a></li>
                    <li><a href="#"><img src="webimages/twitter.png" alt="Twitter"></a></li>
                    <li><a href="#"><img src="webimages/instagram.png" alt="Instagram"></a></li>
                </ul>
            </div>
        </div>
    </div>
    <div class="footer-bottom">
        <p>&copy; 2026 Eternal Flowers. All rights reserved. | Designed by Shibraa Nawaz</p>
    </div>
</footer>

<script src="script.js"></script>
<script>
    // Get cart from localStorage
    let cart = JSON.parse(localStorage.getItem('flowerCart')) || [];

    // Function to get image path based on product name
    function getProductImage(productName) {
        const imageMap = {
            'Featured Bouquet 1': 'webimages/bd 1.jpg',
            'Featured Bouquet 2': 'webimages/valentine 7.jpg',
            'Featured Bouquet 3': 'webimages/fun 5.jpg',
            'Featured Bouquet 4': 'webimages/grad 9.jpg',
            'Valentine Rose Bouquet 1': 'webimages/valentine 10.jpg',
            'Valentine Rose Bouquet 2': 'webimages/valentine 8.jpg',
            'Valentine Rose Bouquet 3': 'webimages/valentine 4.jpg',
            'Valentine Rose Bouquet 4': 'webimages/valentine 2.jpg',
            'Birthday Bouquet 1': 'webimages/bd 2.jpg',
            'Birthday Bouquet 2': 'webimages/bd 4.jpg',
            'Birthday Bouquet 3': 'webimages/bd 6.jpg',
            'Birthday Bouquet 4': 'webimages/bd 8.jpg',
            'Graduation Bouquet 1': 'webimages/grad 3.jpg',
            'Graduation Bouquet 2': 'webimages/grad 6.jpg',
            'Graduation Bouquet 3': 'webimages/grad 2.jpg',
            'Graduation Bouquet 4': 'webimages/grad 1.jpg',
            'Funeral Bouquet 1': 'webimages/fun 3.jpg',
            'Funeral Bouquet 2': 'webimages/fun 7.jpg',
            'Funeral Bouquet 3': 'webimages/fun 1.jpg',
            'Funeral Bouquet 4': 'webimages/fun 2.jpg'
        };
        return imageMap[productName] || 'webimages/logo.png';
    }

    // Display cart
    function displayCart() {
        const container = document.getElementById('cart-container-inner');
        
        if (cart.length === 0) {
            container.innerHTML = `
                <div class="empty-cart">
                    <h2>🛒 Your cart is empty</h2>
                    <p>Browse our <a href="products.html">beautiful flowers</a> and add your favourites!</p>
                </div>
            `;
            return;
        }

        let html = `
            <table class="cart-table">
                <tr>
                    <th>Product</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Total</th>
                    <th>Action</th>
                </tr>
        `;

        let grandTotal = 0;

        for (let i = 0; i < cart.length; i++) {
            const item = cart[i];
            const itemTotal = item.price * item.quantity;
            grandTotal += itemTotal;
            const imagePath = getProductImage(item.name);

            html += `
                <tr>
                    <td>
                        <div class="product-cell">
                            <img src="${imagePath}" alt="${item.name}" class="cart-product-img">
                            <span class="cart-product-name">${item.name}</span>
                        </div>
                    </td>
                    <td>£${item.price.toFixed(2)}</td>
                    <td>
                        <button class="quantity-btn" onclick="updateQuantity(${i}, ${item.quantity - 1})">−</button>
                        ${item.quantity}
                        <button class="quantity-btn" onclick="updateQuantity(${i}, ${item.quantity + 1})">+</button>
                    </td>
                    <td class="cart-item-total">£${itemTotal.toFixed(2)}</td>
                    <td><button class="remove-btn" onclick="removeItem(${i})">🗑️ Remove</button></td>
                </tr>
            `;
        }

        html += `
            </table>
            <div class="cart-total">Grand Total: £${grandTotal.toFixed(2)}</div>
            <button class="checkout-btn" onclick="checkout()">Proceed to Checkout</button>
        `;

        container.innerHTML = html;
    }

    // Update quantity
    function updateQuantity(index, newQuantity) {
        if (newQuantity <= 0) {
            removeItem(index);
            return;
        }
        cart[index].quantity = newQuantity;
        localStorage.setItem('flowerCart', JSON.stringify(cart));
        displayCart();
    }

    // Remove item
    function removeItem(index) {
        cart.splice(index, 1);
        localStorage.setItem('flowerCart', JSON.stringify(cart));
        displayCart();
    }

    // Checkout
    function checkout() {
        if (cart.length === 0) {
            alert('Your cart is empty!');
            return;
        }

        let total = 0;
        let itemList = '';
        let orderItems = [];
        
        for (let item of cart) {
            total += item.price * item.quantity;
            itemList += `\n- ${item.name} x${item.quantity} = £${(item.price * item.quantity).toFixed(2)}`;
            orderItems.push({
                name: item.name,
                price: item.price,
                quantity: item.quantity
            });
        }

        const currentUser = getCurrentUser();
        
        if (!currentUser) {
            if (confirm(`You are not signed in.\n\nOrder Summary:${itemList}\n\nTotal: £${total.toFixed(2)}\n\nSign in to save your order history?`)) {
                window.location.href = 'signin.html';
                return;
            }
        }

        if (confirm(`Thank you for your order!\n\nItems:${itemList}\n\nTotal: £${total.toFixed(2)}\n\nPlace order?`)) {
            if (currentUser) {
                saveOrderToUser(currentUser.email, orderItems, total);
                alert('Order placed and saved to your account!');
            } else {
                alert('Order placed successfully!');
            }
            
            cart = [];
            localStorage.setItem('flowerCart', JSON.stringify(cart));
            displayCart();
            
            if (currentUser) {
                if (confirm('View your order history?')) {
                    window.location.href = 'myaccount.html';
                }
            }
        }
    }

    // Load cart
    displayCart();
</script>

</body>
</html>
